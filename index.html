<!DOCTYPE html>
<html lang="fr">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Menu déroulant CSS</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: Arial, Helvetica, sans-serif;
		}

		nav ul {
			list-style: none;
			display: flex;
		}

		nav li {
			position: relative;
		}

		nav a {
			display: block;
			padding: 12px 24px;
			color: #fff;
			background-color: #EA4335;
			text-decoration: none;
			transition: background-color 0.3s, color 0.3s;
		}

		nav a:hover,
		nav a:focus {
			background-color: #c5352a;
			color: #ffe066;
		}

		/* Sous-menu */
		nav li ul {
			display: none;
			position: absolute;
			top: 100%;
			left: 0;
			min-width: 100%;
			flex-direction: column;
			box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
		}

		nav li:hover > ul,
		nav li:focus-within > ul {
			display: flex;
		}
	</style>
</head>

<body>

	<nav aria-label="Menu principal">
		<ul>
			<li><a href="#">Item</a></li>
			<li>
				<a href="#">Item 2</a>
				<ul>
					<li><a href="#">Sous-menu</a></li>
					<li><a href="#">Sous-menu 2</a></li>
					<li><a href="#">Sous-menu 3</a></li>
				</ul>
			</li>
			<li><a href="#">Item 3</a></li>
		</ul>
	</nav>

</body>

</html>
